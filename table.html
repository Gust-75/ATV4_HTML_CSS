<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotina Semanal</title>
    <link rel="stylesheet" href="style.css">
    <style>* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Segoe UI", Tahoma, sans-serif;
    background: beige;
    padding: 40px;
}

.container {
    max-width: 1100px;
    margin: auto;
}

caption {
    text-align: center;
    color: #1f2937;
    margin-bottom: 25px;
    font-size: 2rem;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(0,0,0,0.15);
}

thead th {
    background: #2563eb;
    color: white;
    padding: 15px;
    font-size: 1rem;
    text-transform: uppercase;
}

tbody td {
    padding: 15px;
    text-align: center;
    border-bottom: 1px solid #dbe3ec;
    color: #374151;
}

tbody tr:nth-child(even) {
    background-color: #f8fafc;
}

tbody tr:hover {
    background-color: #e0ecff;
    transition: 0.3s;
}

.periodo {
    background-color: #1e40af;
    color: white;
    font-weight: bold;
}

tbody tr:last-child td {
    border-bottom: none;
}</style>
</head>
<body>

    <div class="container">
        <table>
            <caption>📅 Minha Rotina Semanal</caption>
            <thead>
                <tr>
                    <th>Período</th>
                    <th>Sáb</th>
                    <th>Dom</th>
                    <th>Seg</th>
                    <th>Ter</th>
                    <th>Qua</th>
                    <th>Qui</th>
                    <th>Sex</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="periodo">Manhã</td>
                    <td colspan="2">Descanso</td>
                    <td colspan="5">bora trampar</td>
                </tr>
                <tr>
                    <td class="periodo">Tarde</td>
                    <td>Trabalando</td>
                    <td>lets play another game time</td>
                    <td colspan="5">Trabalando</td>
                </tr>
                <tr>
                    <td class="periodo">Noite</td>
                    <td colspan="2">Descansar pois o cara não é de ferro</td>
                    <td colspan="5">Bora Estudar</td>
                    
                </tr>
                <tr>
                    <td class="periodo">Madrugada</td>
                    <td colspan="7">A Mimir</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
